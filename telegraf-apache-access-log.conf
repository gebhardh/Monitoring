# Telegraf Konfiguration – Apache Access Log Auswertung
# Datei: /etc/telegraf/telegraf.d/apache-access-log.conf
#
# Erfasste Metriken:
#   - HTTP-Statuscodes (response) → Basis für 2xx/3xx/4xx/5xx-Zählung
#   - Response-Zeit (responsetime_in_s, responsetime_in_ms)
#   - clientip, verb, request, referrer, user-agent, SSL-Felder als Tags/Fields
#
# Erwartetes Log-Format (Beispiel):
# 192.168.1.10 [18/Jun/2026:10:23:45 +0200] proxy.example.com 1 234 "GET /index.html HTTP/1.1" 200 1234 - 1 REF="-" UA="Mozilla/5.0" TLSv1.2 ECDHE-RSA-AES256-GCM-SHA384 "O=Org/CN=client/EMAIL=user@example.com"

# ============================================================
# INPUT: Apache Access Log via inputs.tail
# ============================================================
[[inputs.tail]]
  ## Measurement-Name in InfluxDB / VictoriaMetrics
  name_override = "apache_access_log"

  ## Log-Datei(en) – Wildcards möglich
  files = ["/var/log/apache2/access.log"]
  # Mehrere Dateien oder Wildcards:
  # files = ["/var/log/apache2/*access.log"]

  ## Nur neue Zeilen lesen (false = ab EOF starten)
  from_beginning = false

  ## Datei-Änderungsüberwachung (inotify empfohlen auf Linux)
  watch_method = "inotify"

  ## Pipe-Modus (false für normale Dateien)
  pipe = false

  ## Datenformat: grok für Apache-Logs
  data_format = "grok"

  ## Zeitzone des Apache-Servers
  grok_timezone = "Europe/Berlin"

  ## Custom Pattern (vom Nutzer vorgegeben)
  ## Erfasst: clientip, timestamp, hostr, responsetime_in_s, responsetime_in_ms,
  ##          verb, request, httpversion, response, bytes, user, keepalive,
  ##          referrer, user-agent, ssl_protocol, ssl_cipher,
  ##          ssl_client_s_dn_o/cn/email, cache, ratelimit
  grok_patterns = [
    '%{IPORHOST:clientip} \[%{HTTPDATE:timestamp}\] %{DATA:hostr} %{NUMBER:responsetime_in_s:INT} %{NUMBER:responsetime_in_ms:INT} \"(%{DATA:verb} )?%{DATA:request}( HTTP/%{NUMBER:httpversion})?\" %{NUMBER:response:INT} %{NOTSPACE:bytes:INT} %{NOTSPACE:user} %{NUMBER:keepalive:INT} REF=\"%{DATA:referrer}\" UA=\"%{DATA:useragent}\"(\s%{NOTSPACE:ssl_protocol} %{DATA:ssl_cipher} \"O=%{DATA:ssl_client_s_dn_o}/CN=%{DATA:ssl_client_s_dn_cn}/EMAIL=%{DATA:ssl_client_s_dn_email}\"( CACHE=%{DATA:cache})?|\s*RATELIMITED=%{NOTSPACE:ratelimit})'
  ]

  ## HINWEIS: Im Originalpattern heißt das Feld "user-agent" – der Bindestrich
  ## ist in TOML/Grok-Feldnamen problematisch und wurde zu "useragent" geändert.
  ## Falls das Original-Pattern unverändert bleiben soll, siehe Hinweis im md-File.

  ## Tags: Felder die als Dimensions/Labels gespeichert werden
  ## (geringe Cardinality bevorzugen – clientip/request NICHT als Tag, da hohe Cardinality)
  tag_keys = [
    "verb",
    "httpversion",
    "ssl_protocol",
  ]

# ── Processor: HTTP-Statuskategorie als Tag ableiten ─────────────────────────
# Damit können 2xx/3xx/4xx/5xx direkt gefiltert werden ohne PromQL/Flux-Logik
[[processors.starlark]]
  namepass = ["apache_access_log"]
  source = '''
def apply(metric):
    code = metric.fields.get("response", 0)
    try:
        code_int = int(code)
    except:
        code_int = 0

    if   code_int >= 500: cat = "5xx"
    elif code_int >= 400: cat = "4xx"
    elif code_int >= 300: cat = "3xx"
    elif code_int >= 200: cat = "2xx"
    else:                 cat = "other"

    metric.tags["status_category"] = cat

    # Optional: Rate-Limit-Treffer als eigenes Tag markieren
    if metric.fields.get("ratelimit", None) is not None:
        metric.tags["ratelimited"] = "true"

    return metric
'''

# ── Aggregator: Response-Time-Statistiken pro Intervall ───────────────────────
# Erzeugt z.B. apache_access_log_responsetime_in_ms_mean/max/min/count
[[aggregators.basicstats]]
  namepass      = ["apache_access_log"]
  name_override = "apache_access_log"
  stats         = ["count", "mean", "max", "min"]
  period        = "60s"
  drop_original = false
  fieldpass     = ["responsetime_in_s", "responsetime_in_ms"]

# ── Aggregator: Anzahl Requests je Statuscode ─────────────────────────────────
[[aggregators.valuecounter]]
  namepass      = ["apache_access_log"]
  name_override = "apache_status_count"
  fields        = ["response"]
  period        = "60s"
  drop_original = false

# ============================================================
# OUTPUT: An Prometheus / VictoriaMetrics / InfluxDB senden
# ============================================================

# --- Option A: Prometheus remote_write (VictoriaMetrics / Prometheus) --------
[[outputs.http]]
  namepass = ["apache_access_log", "apache_status_count"]
  url      = "http://victoriametrics:8428/api/v1/write"
  # url    = "http://prometheus:9090/api/v1/write"
  data_format = "prometheusremotewrite"

  [outputs.http.headers]
    Content-Type = "application/x-protobuf"
    Content-Encoding = "snappy"
    X-Prometheus-Remote-Write-Version = "0.1.0"

